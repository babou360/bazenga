name: Auto Deploy Bazenga Frontend (Next.js)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Deploy via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to frontend project
            cd apps/bazenga/bazenga_website

            echo "Cleaning repo..."
            git reset --hard
            git clean -fd

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping old container..."
            docker stop bazenga_website || true
            docker rm bazenga_website || true

            echo "Building new Docker image..."
            docker build -t bazenga_website:latest .

            echo "Starting new container..."
            docker run -d \
              --name bazenga_website \
              -p 6000:6000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              bazenga_website:latest

            echo "Frontend deployment completed!"